############################################################
# GitLeaks конфигурация для ClubDoorman                   #
# Цели:                                                   #
#  1. Минимизировать ложные срабатывания                  #
#  2. Детектить реальные токены (telegram, openai, etc.)  #
#  3. Игнорировать артефакты сборки и тестов              #
#  4. Использовать baseline только для истории            #
############################################################

[allowlist]
description = "Минимальный allowlist для шумных артефактов"
paths = [
    # Build & obj (корневые пути достаточно)
    "bin/",
    "obj/",
    # Test result noise (простая маска каталога)
    "TestResults/",
    # Local env templates/examples
    "env.example",
    ".env.sample",
    "docker-compose.yml.example",
    # Baseline files
    ".gitleaks.baseline.json",
    ".gitleaks.baseline"
]

# Примечание: локальный `.env` не в репо => не нужен в списке. Старые коммиты не сканируем pre-commit (pipe diff).

# Правила для Telegram токенов (только реальные)
[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''(?i)\d+:[a-zA-Z0-9_-]{35,}'''
tags = ["telegram", "token", "bot"]
severity = "HIGH"

# Правила для OpenAI/OpenRouter ключей (только реальные)
[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[a-zA-Z0-9]{48}'''
tags = ["openai", "api", "key"]
severity = "HIGH"

[[rules]]
id = "openrouter-api-key"
description = "OpenRouter API key"
regex = '''sk-or-v1-[a-zA-Z0-9]{48}'''
tags = ["openrouter", "api", "key"]
severity = "HIGH"

# Правила для общих API ключей (только реальные)
[[rules]]
id = "api-key-generic"
description = "Generic API key"
regex = '''(?i)(?:api[_-]?key|token|secret)[_-]?=.*[a-zA-Z0-9_-]{32,}'''
tags = ["api", "key", "token"]
severity = "MEDIUM" 