services:
  doorman:
    build: .
    container_name: doorman
    depends_on:
      - rabbitmq
      - clickhouse
    environment:
      - TZ=Europe/Moscow
      - DOORMAN_CLUB_SERVICE_TOKEN=${DOORMAN_CLUB_SERVICE_TOKEN:-test_token}
      - DOORMAN_BOT_API=${DOORMAN_BOT_API:-test_bot_api}
      - DOORMAN_ADMIN_CHAT=${DOORMAN_ADMIN_CHAT:-123456789}
      - DOORMAN_BLACKLIST_AUTOBAN_DISABLE=${DOORMAN_BLACKLIST_AUTOBAN_DISABLE:-true}
      - DOORMAN_LOW_CONFIDENCE_HAM_ENABLE=${DOORMAN_LOW_CONFIDENCE_HAM_ENABLE:-false}
      - DOORMAN_RABBITMQ__ENABLED=${DOORMAN_RABBITMQ__ENABLED:-false}
      - DOORMAN_RABBITMQ__URI=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      - DOORMAN_RABBITMQ__INPUT_QUEUE=${DOORMAN_RABBITMQ__INPUT_QUEUE:-spampyre.pipeline.input}
      - DOORMAN_RABBITMQ__DLQ=${DOORMAN_RABBITMQ__DLQ:-spampyre.pipeline.dlq}
      - DOORMAN_RABBITMQ__PREFETCH=${DOORMAN_RABBITMQ__PREFETCH:-50}
      - DOORMAN_RABBITMQ__PUBLISH_TIMEOUT_SECONDS=${DOORMAN_RABBITMQ__PUBLISH_TIMEOUT_SECONDS:-5}
      - DOORMAN_RABBITMQ__EVENT_EXCHANGE=${DOORMAN_RABBITMQ__EVENT_EXCHANGE:-spampyre.events}
      - DOORMAN_CLICKHOUSE__ENABLED=${DOORMAN_CLICKHOUSE__ENABLED:-false}
      - DOORMAN_CLICKHOUSE__URL=${DOORMAN_CLICKHOUSE__URL:-http://clickhouse:8123}
      - DOORMAN_CLICKHOUSE__DATABASE=${DOORMAN_CLICKHOUSE__DATABASE:-tg}
      - DOORMAN_CLICKHOUSE__RAW_TABLE=${DOORMAN_CLICKHOUSE__RAW_TABLE:-tg.messages_raw}
      - DOORMAN_CLICKHOUSE__INGEST_SOURCE=${DOORMAN_CLICKHOUSE__INGEST_SOURCE:-live}
      - DOORMAN_CLICKHOUSE__BATCH_SIZE=${DOORMAN_CLICKHOUSE__BATCH_SIZE:-500}
      - DOORMAN_CLICKHOUSE__FLUSH_MS=${DOORMAN_CLICKHOUSE__FLUSH_MS:-500}
      - DOORMAN_CLICKHOUSE__CHANNEL_CAPACITY=${DOORMAN_CLICKHOUSE__CHANNEL_CAPACITY:-5000}
      - DOORMAN_CLICKHOUSE__MAX_RETRY=${DOORMAN_CLICKHOUSE__MAX_RETRY:-3}
      - DOORMAN_CLICKHOUSE__RETRY_DELAY=${DOORMAN_CLICKHOUSE__RETRY_DELAY:-2}
      - DOORMAN_CLICKHOUSE__HTTP_TIMEOUT=${DOORMAN_CLICKHOUSE__HTTP_TIMEOUT:-10}
    volumes:
      - ./ClubDoorman/data:/app/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: ${DOORMAN_CLICKHOUSE__DATABASE:-tg}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    restart: unless-stopped

volumes:
  rabbitmq-data:
  clickhouse-data:
  clickhouse-logs:
